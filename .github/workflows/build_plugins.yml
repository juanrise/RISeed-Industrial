name: Build VST3 Plugin

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────────
  #  Windows — VST3 only
  # ──────────────────────────────────────────────
  build-windows:
    name: Build Windows VST3
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache JUCE and Build
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            JUCE
            build
          key: ${{ runner.os }}-juce-${{ hashFiles('CMakeLists.txt') }}

      - name: Fetch JUCE
        if: steps.cache.outputs.cache-hit != 'true'
        run: git clone --branch 8.0.0 --depth 1 https://github.com/juce-framework/JUCE.git JUCE

      - name: Configure CMake
        run: cmake -B build -S .

      - name: Build VST3
        run: cmake --build build --config Release

      - name: Upload Windows VST3
        uses: actions/upload-artifact@v4
        with:
          name: RISeed-Industrial-Windows-VST3
          path: build/RISeed-Industrial_artefacts/VST3/

  # ──────────────────────────────────────────────
  #  macOS — VST3 Universal Binary only
  # ──────────────────────────────────────────────
  build-macos:
    name: Build macOS VST3 (Universal)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Cache JUCE and Build
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            JUCE
            build
          key: ${{ runner.os }}-juce-${{ hashFiles('CMakeLists.txt') }}

      - name: Fetch JUCE
        if: steps.cache.outputs.cache-hit != 'true'
        run: git clone --branch 8.0.0 --depth 1 https://github.com/juce-framework/JUCE.git JUCE

      - name: Configure CMake (Universal Binary)
        run: cmake -B build -S . -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64"

      - name: Build VST3
        run: cmake --build build --config Release

      - name: Upload macOS VST3
        uses: actions/upload-artifact@v4
        with:
          name: RISeed-Industrial-macOS-VST3
          path: build/RISeed-Industrial_artefacts/VST3/

  # ──────────────────────────────────────────────
  #  Release — runs only on main, after both builds succeed
  # ──────────────────────────────────────────────
  release:
    name: Publish Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # needed to force-push the tag

      - name: Move release tag to latest commit
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag -f v1.0.0-beta
          git push -f origin v1.0.0-beta

      - name: Download Windows VST3
        uses: actions/download-artifact@v4
        with:
          name: RISeed-Industrial-Windows-VST3
          path: artefacts/windows

      - name: Download macOS VST3
        uses: actions/download-artifact@v4
        with:
          name: RISeed-Industrial-macOS-VST3
          path: artefacts/macos

      - name: Create ZIPs
        run: |
          # macOS: add a one-step install helper script
          cat > artefacts/macos/INSTALL_MAC.sh << 'EOF'
          #!/bin/bash
          echo "Removing macOS quarantine from plugin..."
          xattr -rd com.apple.quarantine RISeed-Industrial.vst3
          echo "Copying to /Library/Audio/Plug-Ins/VST3/ ..."
          sudo cp -R RISeed-Industrial.vst3 /Library/Audio/Plug-Ins/VST3/
          echo "Done! Restart Ableton and rescan plugins."
          EOF
          chmod +x artefacts/macos/INSTALL_MAC.sh

          # Windows: add a one-step install helper script
          cat > artefacts/windows/INSTALL_WINDOWS.ps1 << 'EOF'
          Write-Host "Copying VST3 to system plugin folder..."
          Copy-Item "RISeed-Industrial.vst3" "$env:COMMONPROGRAMFILES\VST3" -Recurse -Force
          Write-Host "Done! Restart your DAW and rescan plugins."
          EOF

          cd artefacts/windows && zip -r ../../RISeed-Industrial_Windows.zip . && cd ../..
          cd artefacts/macos  && zip -r ../../RISeed-Industrial_macOS.zip  . && cd ../..

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.0-beta
          name: "RISeed-Industrial v1.0.0-beta (Latest)"
          prerelease: false
          body: |
            ## RISeed-Industrial VST3

            ### macOS
            1. Unzip `RISeed-Industrial_macOS.zip`
            2. Run `INSTALL_MAC.sh` in Terminal (or manually copy `.vst3` to `/Library/Audio/Plug-Ins/VST3/`)
            3. Restart Ableton and rescan plugins

            ### Windows
            1. Unzip `RISeed-Industrial_Windows.zip`
            2. Run `INSTALL_WINDOWS.ps1` as Administrator (or manually copy `.vst3` to `C:\Program Files\Common Files\VST3\`)
            3. Restart your DAW and rescan plugins
          files: |
            RISeed-Industrial_Windows.zip
            RISeed-Industrial_macOS.zip
